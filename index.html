<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino | Join4Join Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen p-4 md:p-10">

    <div class="max-w-md mx-auto p-6 glass rounded-2xl border border-gray-800 mb-8">
        <h2 class="text-lg font-bold text-cyan-400 mb-4">Account Configuration</h2>
        <input id="userId" placeholder="Discord User ID" class="w-full p-3 mb-3 bg-gray-950 border border-gray-800 rounded-lg text-sm">
        <input id="apiKey" placeholder="API Secret Key" class="w-full p-3 mb-4 bg-gray-950 border border-gray-800 rounded-lg text-sm">
        <button onclick="saveAndValidate()" id="saveBtn" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-semibold transition">Save & Validate Key</button>
        <p id="authStatus" class="mt-3 text-xs text-center"></p>
    </div>

    <main class="max-w-4xl mx-auto p-8 glass rounded-2xl border border-gray-800">
        <h1 class="text-3xl font-bold text-white mb-8 text-center">Casino Engine</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <button onclick="playGame('coinflip')" class="p-6 bg-gray-900 hover:bg-cyan-900/30 border border-gray-800 rounded-xl transition text-sm font-bold">Coin Flip</button>
            <button onclick="playGame('dice')" class="p-6 bg-gray-900 hover:bg-cyan-900/30 border border-gray-800 rounded-xl transition text-sm font-bold">Dice</button>
            <button onclick="playGame('slots')" class="p-6 bg-gray-900 hover:bg-cyan-900/30 border border-gray-800 rounded-xl transition text-sm font-bold">Slots</button>
            <button onclick="playGame('mines')" class="p-6 bg-gray-900 hover:bg-cyan-900/30 border border-gray-800 rounded-xl transition text-sm font-bold">Mines</button>
            <button onclick="playGame('highlow')" class="p-6 bg-gray-900 hover:bg-cyan-900/30 border border-gray-800 rounded-xl transition text-sm font-bold">High/Low</button>
        </div>

        <div id="result-area" class="mt-8 text-center font-bold text-xl min-h-[3rem]"></div>
    </main>

    <script>
        const API_URL = 'https://sturdy-octo-guacamole-iota.vercel.app/api/casino_api';

        async function saveAndValidate() {
            const userId = document.getElementById('userId').value;
            const key = document.getElementById('apiKey').value;
            const status = document.getElementById('authStatus');
            
            status.innerText = "Validating...";
            
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "validate", user_id: userId, key: key })
            });
            const data = await res.json();

            if (data.valid) {
                localStorage.setItem('j4j_uid', userId);
                localStorage.setItem('j4j_key', key);
                status.innerHTML = '<span class="text-green-400">✅ Key Validated!</span>';
            } else {
                status.innerHTML = '<span class="text-red-400">❌ Invalid Key. Try another.</span>';
            }
        }

        async function playGame(gameType) {
            const userId = localStorage.getItem('j4j_uid');
            const key = localStorage.getItem('j4j_key');

            if (!userId || !key) return alert("Please configure your keys first.");

            document.getElementById('result-area').innerHTML = "Playing...";

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: "mines_play", // mapped to your backend logic
                    user_id: userId, 
                    key: key, 
                    game_type: gameType, 
                    bet: 10 
                })
            });

            const data = await res.json();
            document.getElementById('result-area').innerHTML = data.win 
                ? `<span class="text-green-400">🎉 VICTORY! ${data.msg || ''}</span>` 
                : `<span class="text-red-400">💀 ${data.msg || 'LOSS'} - Coins Transferred.</span>`;
        }
    </script>
</body>
</html>
